<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MPG Multi-Task Organizer FINAL</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 10px; margin: 0; }
        .card { background: #2d2d2d; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2, h3 { margin-top: 0; margin-bottom: 8px; }
        .input-text { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 5px; border: 1px solid #444; background: #1e1e1e; color: white; margin-bottom: 10px; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .btn { flex: 1; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #fff; text-align: center; font-size: 14px; min-width: 120px; }
        .btn-save { background: #4caf50; } .btn-reset { background: #555; } .btn-qr { background: #673ab7; }
        .btn-print { background: #e91e63; } .btn-kml { background: #ff9800; } .btn-csv { background: #00bcd4; }
        .track-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; padding: 0; list-style: none; }
        .track-item { background: #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; border: 1px solid #555; }
        .track-item.active { background: #00bcd4; }
        .btn-del-single { background: #f44336; color: white; border: none; padding: 2px 6px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: 10px; }
        .popup-del-link { color: #f44336; font-weight: bold; cursor: pointer; display: block; margin-top: 5px; text-decoration: underline; }
        
        #map { width: 100%; height: 450px; border-radius: 8px; border: 2px solid #444; background: #e5e3df; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #555; padding: 6px; text-align: center; }
        th { background: #333; }
        .penale-input, .dekl-input { padding: 4px; background: #1e1e1e; color: white; border: 1px solid #666; text-align: center; border-radius: 3px; }
        .penale-input { width: 45px; } .dekl-input { width: 65px; }
        .kontrola-box { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: #333; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .kontrola-input { width: 60px; padding: 5px; border-radius: 4px; border: 1px solid #555; background: #222; color: white; text-align: center; font-weight: bold; font-size: 16px; }
        .point-breakdown { font-size: 11px; color: #aaa; display: block; margin-top: 2px; }
        #status-kreslenia { background: #ff9800; color: #000; padding: 8px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; display: none; text-align: center; }
        
        /* OVLÁDACIE PRVKY PRE 2-KROKOVÚ TLAČ */
        #print-controls { display: none; position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 9999; gap: 10px; width: 90%; max-width: 500px; }
        #print-controls button { flex: 1; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .btn-confirm-print { background: #4caf50; }
        .btn-cancel-print { background: #f44336; }

        /* REŽIM NÁHĽADU PRED TLAČOU */
        body.prep-print-map .card:not(#map-container) { display: none !important; }
        body.prep-print-map #status-kreslenia { display: none !important; }
        body.prep-print-map h3 { display: none !important; }
        body.prep-print-map #print-controls { display: flex !important; }
        body.prep-print-map #map-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; padding: 0; margin: 0; border: none; z-index: 9998; background: #fff; }
        body.prep-print-map #map { width: 100% !important; height: 100% !important; border: none !important; border-radius: 0 !important; }

        /* CSS PRE SAMOTNÚ FYZICKÚ TLAČ */
        body.prep-print-board .card:not(#leaderboard-box) { display: none !important; }
        body.prep-print-board #status-kreslenia { display: none !important; }
        body.prep-print-board #leaderboard-box { background: transparent; box-shadow: none; border: none; padding: 0; }
        body.prep-print-board #leaderboard-box h3 { color: black; font-size: 20px; }

        @media print {
            @page { size: landscape; margin: 0; }
            body { background: #fff; color: #000; padding: 0; margin: 0; -webkit-print-color-adjust: exact; }
            
            #print-controls { display: none !important; } /* Skryje tlačidlá na papieri */
            .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
            
            table { font-size: 12px; color: black; width: 100%; } 
            th, td { border: 1px solid #ccc; padding: 4px; }
            th { background: #eee !important; }
            .dekl-input, .penale-input { border: none; background: transparent; color: black; font-weight: bold; }
        }
    </style>
</head>
<body>
    <div id="print-controls">
        <button class="btn-cancel-print" onclick="zrusitNahladMapy()">❌ ZRUŠIŤ</button>
        <button class="btn-confirm-print" onclick="potvrditTlacMapy()">🖨️ POTVRDIŤ TLAČ</button>
    </div>

    <div class="card">
        <h2>🧭 MPG Multi-Task Organizer FINAL</h2>
        <input type="text" id="task-name-input" class="input-text" value="Task 1">
        <div class="btn-group">
            <button class="btn btn-save" onclick="ulozitTratDoPamate()">Uložiť trať 💾</button>
            <button class="btn btn-print" onclick="pripravitMapuNaTlac()">Tlačiť mapu 🖼️</button>
            <button class="btn btn-kml" onclick="exportovatDoKML()">Stiahnuť KML 🛰️</button>
            <button class="btn btn-qr" onclick="zobrazitQR()">QR Kód 📱</button>
            <button class="btn btn-reset" onclick="vynulovatTrat()">Vyčistiť 🔄</button>
        </div>
        <div id="qrcode-container" style="display:none; text-align:center; padding:15px; background:white; border-radius:8px;"></div>
        <ul id="ulozene-trate-list" class="track-list"></ul>
    </div>

    <div id="status-kreslenia">✏️ REŽIM BRÁNY: Klikni na mape, kde má brána KONČIŤ!</div>
    
    <div class="card" id="zoznam-bodov-container">
        <h3>📍 Bodový zoznam:</h3>
        <div id="zoznam-bodov"><em style="color: #888;">Klikaj do mapy! ("Štart"/"Cieľ" = Brána)</em></div>
    </div>

    <div class="card" id="map-container">
        <h3>🗺️ Mapa:</h3>
        <div id="map"></div>
    </div>

    <div class="card" id="upload-container">
        <h3>📥 Nahrávanie letov</h3>
        <div class="kontrola-box">
            <label>Počet pretekárov:</label>
            <input type="number" id="pocet-pretekarov" class="kontrola-input" value="0" min="0" onchange="vyhodnotStatus()">
            <span id="upload-status" style="font-weight: bold; font-size: 14px; color: #aaa;">Zatiaľ nenahraté žiadne lety</span>
        </div>
        <label for="igc-input" style="display:block; background:#e67e22; padding:12px; border-radius:5px; text-align:center; cursor:pointer; font-weight:bold; color:white;">📂 VYBRAŤ A NAHRAŤ IGC SÚBORY</label>
        <input type="file" id="igc-input" accept=".igc" multiple style="display:none;">
    </div>

    <div class="card" id="leaderboard-box" style="display:none; overflow-x: auto;">
        <h3>🏆 Výsledková listina</h3>
        <div class="btn-group" style="margin-bottom: 10px;">
            <button class="btn btn-csv" onclick="exportovatDoCSV()">Stiahnuť CSV (Excel) 📊</button>
            <button class="btn btn-print" onclick="tlacitVysledky()">Tlačiť výsledky 🖨️</button>
        </div>
        <div id="leaderboard-table-container"></div>
    </div>

    <script>
        let mojeOtocneBody = []; let mapMarkers = []; let mapVisuals = []; let flightPolylines = []; let vsetkyTrate = {};
        let vysledkyPiloti = []; let rezimKresleniaBrany = false; let docasnyNazovBrany = ""; let prvyBodBrany = null; let docasnyMarker = null; let map = null;
        
        // ========================================================
        // NOVÁ 2-KROKOVÁ TLAČ MAPY (Špeciálne pre mobily)
        // ========================================================
        
        // KROK 1: Roztiahnutie mapy a čakanie na potvrdenie
        window.pripravitMapuNaTlac = function() {
            if (mojeOtocneBody.length === 0) {
                alert("Nemáš na mape žiadne body!");
                return;
            }
            
            // Prepnutie do full-screen režimu
            document.body.classList.add("prep-print-map");
            map.invalidateSize(); 

            // Priblíženie na body
            let bodyPreZoom = [];
            mojeOtocneBody.forEach(b => {
                if (b.typ === "gate") { bodyPreZoom.push([b.p1[0], b.p1[1]]); bodyPreZoom.push([b.p2[0], b.p2[1]]); }
                else { bodyPreZoom.push([b.lat, b.lon]); }
            });
            if (bodyPreZoom.length > 0) {
                map.fitBounds(L.latLngBounds(bodyPreZoom), { padding: [30, 30] });
            }
        }

        // KROK 2: Fyzické spustenie tlače, keď používateľ vidí načítanú mapu
        window.potvrditTlacMapy = function() {
            window.print();
        }

        // ZRUŠENIE náhľadu a návrat do normálu
        window.zrusitNahladMapy = function() {
            document.body.classList.remove("prep-print-map");
            
            setTimeout(() => {
                map.invalidateSize();
                let bodyPreZoom = [];
                mojeOtocneBody.forEach(b => {
                    if (b.typ === "gate") { bodyPreZoom.push([b.p1[0], b.p1[1]]); bodyPreZoom.push([b.p2[0], b.p2[1]]); }
                    else { bodyPreZoom.push([b.lat, b.lon]); }
                });
                if (bodyPreZoom.length > 0) map.fitBounds(L.latLngBounds(bodyPreZoom), { padding: [20, 20] });
            }, 200);
        }

        window.tlacitVysledky = function() {
            document.body.classList.add("prep-print-board");
            window.print();
            document.body.classList.remove("prep-print-board");
        }

        function inicializujMapu() {
            map = L.map('map').setView([48.6, 19.5], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            
            // MIERKA NA MAPU - Zobrazí sa vľavo dole
            L.control.scale({ imperial: false, position: 'bottomleft', maxWidth: 200 }).addTo(map);

            nacitatVsetkyTrateZPamate();
            map.on('click', mapClickAction);
            setTimeout(() => { if(map) map.invalidateSize(); }, 500);
        }
        
        function mapClickAction(e) {
            const lat = e.latlng.lat; const lon = e.latlng.lng;
            if (rezimKresleniaBrany) {
                if (docasnyMarker) map.removeLayer(docasnyMarker);
                document.getElementById('status-kreslenia').style.display = "none"; rezimKresleniaBrany = false;
                mojeOtocneBody.push({ nazov: docasnyNazovBrany, typ: "gate", lat: (prvyBodBrany.lat + lat) / 2, lon: (prvyBodBrany.lon + lon) / 2, p1: [prvyBodBrany.lat, prvyBodBrany.lon], p2: [lat, lon] });
                prekresliVsetkyBody(); return;
            }
            const cisloBodov = mojeOtocneBody.length + 1; let pNazov = cisloBodov === 1 ? "START" : "Otocak " + cisloBodov;
            const nazov = prompt("Názov bodu:", pNazov); if (!nazov) return; const nazovUpper = nazov.toUpperCase();
            if (nazovUpper === "START" || nazovUpper === "CIEL") {
                rezimKresleniaBrany = true; docasnyNazovBrany = nazovUpper; prvyBodBrany = { lat: lat, lon: lon };
                docasnyMarker = L.circleMarker([lat, lon], { radius: 6, color: '#ff9800' }).addTo(map);
                document.getElementById('status-kreslenia').style.display = "block";
            } else {
                const radius = parseInt(prompt("Polomer valca (m):", "100")) || 100;
                mojeOtocneBody.push({ nazov: nazovUpper, lat: lat, lon: lon, typ: "cylinder", rozmer: radius });
                prekresliVsetkyBody();
            }
        }

        function prekresliVsetkyBody() {
            mapMarkers.forEach(m => map.removeLayer(m)); mapVisuals.forEach(v => map.removeLayer(v));
            mapMarkers = []; mapVisuals = [];
            mojeOtocneBody.forEach((b, i) => {
                const marker = L.marker([b.lat, b.lon]).addTo(map).bindPopup(`<b>${b.nazov}</b><br><span class="popup-del-link" onclick="zmazatBod(${i})">🗑️ Zmazať</span>`);
                mapMarkers.push(marker);
                if (b.typ === "gate") { mapVisuals.push(L.polyline([b.p1, b.p2], { color: '#ff9800', weight: 6 }).addTo(map)); }
                else { mapVisuals.push(L.circle([b.lat, b.lon], { color: 'red', fillColor: '#f03', fillOpacity: 0.15, radius: b.rozmer }).addTo(map)); }
            });
            let html = '<ul>'; mojeOtocneBody.forEach((b, i) => { html += `<li><strong>${i+1}. ${b.nazov}</strong> <button class="btn-del-single" onclick="zmazatBod(${i})">X</button></li>`; });
            document.getElementById('zoznam-bodov').innerHTML = html + '</ul>';
            vykresliLeaderboard();
        }

        window.zmazatBod = function(i) { mojeOtocneBody.splice(i, 1); prekresliVsetkyBody(); }
        function ulozitTratDoPamate() { const meno = document.getElementById('task-name-input').value; if(!meno) return; vsetkyTrate[meno] = mojeOtocneBody; localStorage.setItem('mpg_trate_final', JSON.stringify(vsetkyTrate)); vykresliZoznamUlozenychTrati(); }
        function nacitatVsetkyTrateZPamate() { const d = localStorage.getItem('mpg_trate_final'); if (d) { vsetkyTrate = JSON.parse(d); vykresliZoznamUlozenychTrati(); } }
        function vykresliZoznamUlozenychTrati() { const ul = document.getElementById('ulozene-trate-list'); ul.innerHTML = ""; Object.keys(vsetkyTrate).forEach(m => { const li = document.createElement('li'); li.className = 'track-item'; li.innerText = m; li.onclick = () => { mojeOtocneBody = vsetkyTrate[m]; prekresliVsetkyBody(); }; ul.appendChild(li); }); }
        function vynulovatTrat() { mojeOtocneBody = []; prekresliVsetkyBody(); document.getElementById('qrcode-container').style.display="none"; }
        
        function zobrazitQR() { 
            const qrBox = document.getElementById('qrcode-container'); 
            qrBox.innerHTML = "<h4 style='color:black; margin-top:0;'>Naskenuj pre body</h4>"; 
            const minified = mojeOtocneBody.map(b => `${b.nazov}|${b.lat.toFixed(5)}|${b.lon.toFixed(5)}`).join(';'); 
            new QRCode(qrBox, { text: minified, width: 200, height: 200 }); 
            qrBox.style.display = "block"; 
        }

        function exportovatDoKML() {
            if (mojeOtocneBody.length === 0) return alert("Nemáš žiadne body na mape!");
            let kml = '<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';
            mojeOtocneBody.forEach(b => { kml += `<Placemark><name>${b.nazov}</name><Point><coordinates>${b.lon},${b.lat},0</coordinates></Point></Placemark>`; });
            kml += '</Document></kml>';
            const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "MPG_Task.kml"; a.click();
        }

        function parseCoord(str, isLon) { let d = parseFloat(str.substring(0, isLon ? 3 : 2)); let m = parseFloat(str.substring(isLon ? 3 : 2)) / 60000; return d + m; }
        function getDist(lat1, lon1, lat2, lon2) { const R=6371000; const dLat=(lat2-lat1)*Math.PI/180; const dLon=(lon2-lon1)*Math.PI/180; const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2); return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
        function ciarySaPretinaju(A,B,C,D) { function ccw(p1,p2,p3){return(p3[0]-p1[0])*(p2[1]-p1[1])>(p2[0]-p1[0])*(p3[1]-p1[1]);} return(ccw(A,C,D)!==ccw(B,C,D))&&(ccw(A,B,C)!==ccw(A,B,D)); }
        function formatCas(s) { const h = Math.floor(s/3600); const m = Math.floor((s%3600)/60); const sec = s%60; return (h>0?h+"h ":"")+m+"m "+sec+"s"; }

        const citajSubor = (file) => new Promise((resolve) => { const reader = new FileReader(); reader.onload = (e) => resolve({ text: e.target.result, file: file.name }); reader.readAsText(file); });

        document.getElementById('igc-input').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files); if (files.length === 0) return;
            vysledkyPiloti = []; flightPolylines.forEach(pl => map.removeLayer(pl)); flightPolylines = [];
            
            const results = await Promise.all(files.map(f => citajSubor(f)));
            
            results.forEach(res => {
                let menoPilota = res.file.replace('.igc',''); let trackPoints = [];
                res.text.split(/\r?\n/).forEach(r => {
                    if (r.startsWith('H') && r.toUpperCase().includes('PILOT')) { const idx = r.indexOf(':'); if(idx !== -1) { let mozne = r.substring(idx+1).trim(); if(mozne) menoPilota = mozne; } }
                    if (r.startsWith('B') && r.length >= 24) { const cStr = r.substring(1, 7); const lat = parseCoord(r.substring(7, 15), false); const lon = parseCoord(r.substring(15, 24), true); const sec = parseInt(cStr.substring(0,2))*3600 + parseInt(cStr.substring(2,4))*60 + parseInt(cStr.substring(4,6)); trackPoints.push({ lat: lat, lon: lon, sekundy: sec }); }
                });

                let pl = L.polyline(trackPoints.map(p => [p.lat, p.lon]), { color: '#' + Math.floor(Math.random()*16777215).toString(16), weight: 3, opacity: 0.7 }).addTo(map);
                flightPolylines.push(pl);

                let preletenePoradie = 0; let casyPreletov = [];
                mojeOtocneBody.forEach(bod => {
                    let preleteny = false; let secPreletu = 0;
                    if (bod.typ === "gate") { for (let i=1; i<trackPoints.length; i++) { if (ciarySaPretinaju([trackPoints[i-1].lat, trackPoints[i-1].lon], [trackPoints[i].lat, trackPoints[i].lon], bod.p1, bod.p2)) { preleteny = true; secPreletu = trackPoints[i].sekundy; break; } } } 
                    else { for (let i=0; i<trackPoints.length; i++) { if (getDist(trackPoints[i].lat, trackPoints[i].lon, bod.lat, bod.lon) <= bod.rozmer) { preleteny = true; secPreletu = trackPoints[i].sekundy; break; } } }
                    if(preleteny) { preletenePoradie++; casyPreletov.push(secPreletu); }
                });

                let casBase = (casyPreletov.length >= 2) ? Math.max(...casyPreletov) - Math.min(...casyPreletov) : 0;
                vysledkyPiloti.push({ meno: menoPilota, splnene: preletenePoradie, casBase: casBase, penale: 0, maCas: (casyPreletov.length >= 2), deklarovanyText: "", deklarovanySec: 0 });
            });
            
            vyhodnotStatus();
            if(flightPolylines.length > 0) map.fitBounds(flightPolylines[0].getBounds());
            vykresliLeaderboard();
        });

        window.vyhodnotStatus = function() {
            const pocetCakanych = parseInt(document.getElementById('pocet-pretekarov').value) || 0;
            const pocetNahratych = vysledkyPiloti.length;
            const statusEl = document.getElementById('upload-status');
            
            if (pocetCakanych > 0) {
                if (pocetNahratych === pocetCakanych) { statusEl.innerHTML = `✅ Výborne! Nahraté sú všetky lety (${pocetNahratych} z ${pocetCakanych})`; statusEl.style.color = '#4caf50'; } 
                else if (pocetNahratych < pocetCakanych) { statusEl.innerHTML = `⚠️ Pozor, chýbajú lety! Nahratých je len ${pocetNahratych} z ${pocetCakanych}`; statusEl.style.color = '#ff9800'; }
                else { statusEl.innerHTML = `❓ Nahratých je viac letov ako bolo zadané (${pocetNahratych} z ${pocetCakanych})`; statusEl.style.color = '#e91e63'; }
            } else { statusEl.innerHTML = `✅ Nahraté lety: ${pocetNahratych}`; statusEl.style.color = '#4caf50'; }
        }

        // Bodovanie s matematickým zaokrúhľovaním
        function vypocitajBodyZCasu(realnyCas, deklarovanyCas) {
            if (!deklarovanyCas || deklarovanyCas <= 0) return 0;
            let diff = Math.abs(realnyCas - deklarovanyCas);
            let strateneBody = Math.round(diff / 60); 
            let body = 15 - strateneBody;
            return body > 0 ? body : 0;
        }

        window.zmenDeklarovany = function(index, text) {
            vysledkyPiloti[index].deklarovanyText = text;
            let parts = text.split(':');
            let sec = (parts.length === 2) ? (parseInt(parts[0]) * 60 + parseInt(parts[1])) : parseInt(text) * 60;
            vysledkyPiloti[index].deklarovanySec = isNaN(sec) ? 0 : sec;
            vykresliLeaderboard();
        }

        window.zmenPenale = function(index, val) { vysledkyPiloti[index].penale = parseInt(val) || 0; vykresliLeaderboard(); }

        function vykresliLeaderboard() {
            if(vysledkyPiloti.length === 0) return;
            document.getElementById('leaderboard-box').style.display = "block";
            
            vysledkyPiloti.forEach(p => {
                let realnyCas = p.maCas ? (p.casBase + p.penale) : 0;
                p.bodyCas = p.maCas ? vypocitajBodyZCasu(realnyCas, p.deklarovanySec) : 0;
                p.bodyOtocaky = p.splnene * 2; 
                p.bodySpolu = p.bodyOtocaky + p.bodyCas;
            });

            vysledkyPiloti.sort((a, b) => {
                if (b.bodySpolu !== a.bodySpolu) return b.bodySpolu - a.bodySpolu;
                const casA = a.maCas ? (a.casBase + a.penale) : Infinity;
                const casB = b.maCas ? (b.casBase + b.penale) : Infinity;
                return casA - casB;
            });

            let html = `<table><tr>
                <th>#</th>
                <th>Pilot</th>
                <th>Preletené<br>otočáky</th>
                <th>Čas letu</th>
                <th>Deklar. čas<br><small>(mm:ss)</small></th>
                <th>Penále (s)</th>
                <th>Finálny čas</th>
                <th style="color:#4caf50;">CELKOM BODY</th>
            </tr>`;
            
            vysledkyPiloti.forEach((p, i) => {
                let celkovy = p.maCas ? formatCas(p.casBase + p.penale) : "Nedokončil";
                let casL = p.maCas ? formatCas(p.casBase) : "-";
                
                html += `<tr>
                    <td>${i+1}</td>
                    <td><b>${p.meno}</b></td>
                    <td>${p.splnene} / ${mojeOtocneBody.length} <br><span class="point-breakdown">(+${p.bodyOtocaky}b)</span></td>
                    <td>${casL}</td>
                    <td><input type="text" class="dekl-input" placeholder="mm:ss" value="${p.deklarovanyText}" onchange="zmenDeklarovany(${i}, this.value)"></td>
                    <td><input type="number" class="penale-input" value="${p.penale}" onchange="zmenPenale(${i}, this.value)"></td>
                    <td style="font-weight:bold; color:#ff9800;">${celkovy}</td>
                    <td style="font-size:16px; font-weight:bold; color:#4caf50;">${p.bodySpolu} <br><span class="point-breakdown" style="font-weight:normal; font-size:11px;">(Otočáky: ${p.bodyOtocaky} | Čas: ${p.bodyCas})</span></td>
                </tr>`;
            });
            html += `</table>`;
            document.getElementById('leaderboard-table-container').innerHTML = html;
        }

        window.exportovatDoCSV = function() {
            let csv = "\uFEFFPoradie;Pilot;Pocet otocakov;Body za otocaky;Cisty cas (s);Deklarovany (s);Penalizacia (s);Body za cas;CELKOVE BODY\n";
            vysledkyPiloti.forEach((p, i) => { csv += `${i+1};${p.meno};${p.splnene};${p.bodyOtocaky};${p.casBase};${p.deklarovanySec};${p.penale};${p.bodyCas};${p.bodySpolu}\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = "Vysledky.csv"; a.click();
        }

        inicializujMapu();

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MPG Multi-Task Scorer Pro v10</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 10px; margin: 0; }
        .card { background: #2d2d2d; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2, h3 { margin-top: 0; margin-bottom: 8px; }
        input[type="file"] { display: none; }
        .file-label { display: block; background: #e67e22; text-align: center; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; box-shadow: 0 3px 5px rgba(0,0,0,0.4); }
        #debug-log { background: #4caf50; color: #fff; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-weight: bold; font-size: 14px; text-align: center; }
        .info-time { background: #1565c0; color: white; padding: 10px; border-radius: 5px; font-weight: bold; font-size: 16px; margin-bottom: 10px; border-left: 5px solid #0d47a1; }
        .pilot-name { background: #00875a; color: white; padding: 8px 12px; border-radius: 5px; font-weight: bold; font-size: 16px; margin-bottom: 10px; border-left: 5px solid #006644; }
        .drawing-status { background: #ff9800; color: #000; padding: 8px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; display: none; text-align: center; }
        .input-text { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 5px; border: 1px solid #444; background: #1e1e1e; color: white; margin-bottom: 10px; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn { flex: 1; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #fff; text-align: center; font-size: 14px; }
        .btn-save { background: #4caf50; }
        .btn-reset { background: #555; }
        .btn-export-img { background: #e91e63; color: white; }
        .btn-export-kml { background: #673ab7; color: white; }
        .track-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; padding: 0; list-style: none; }
        .track-item { background: #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; border: 1px solid #555; }
        .track-item.active { background: #00bcd4; border-color: #00acc1; }
        .btn-del-single { background: #f44336; color: white; border: none; padding: 2px 6px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: 10px; }
        .popup-del-link { color: #f44336; font-weight: bold; cursor: pointer; display: block; margin-top: 5px; text-decoration: underline; }
        #map { width: 100%; height: 380px; border-radius: 8px; border: 2px solid #444; background: #222; box-sizing: border-box; }
        ul { padding-left: 20px; margin: 5px 0; }
        li { margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="debug-log">🟢 VERZIA 10 (S podporou XCTrack mien)</div>
    <div class="card">
        <h2>🧭 MPG Multi-Task Scorer Pro v10</h2>
        <label>Názov trate:</label>
        <input type="text" id="task-name-input" class="input-text" value="Task 1">
        <div class="btn-group">
            <button class="btn btn-save" onclick="ulozitTratDoPamate()">Uložiť 💾</button>
            <button class="btn btn-reset" onclick="vynulovatTrat()">Vyčistiť 🔄</button>
        </div>
        <ul id="ulozene-trate-list" class="track-list"></ul>
    </div>
    <div class="card">
        <h3>📍 Aktívna trať:</h3>
        <div id="zoznam-bodov"><em style="color: #888;">Klikaj do mapy pre pridanie bodov!</em></div>
        <label for="igc-input" class="file-label">📥 VYBRAŤ A VYHODNOTIŤ .IGC</label>
        <input type="file" id="igc-input" accept=".igc">
    </div>
    <div class="card" id="vysledky-box" style="display:none;">
        <h3>📊 Výsledky:</h3>
        <div id="pilot-box" class="pilot-name"></div>
        <div id="celkovy-cas-box" class="info-time"></div>
        <div id="vysledok-text"></div>
    </div>
    <div id="map"></div>

    <script>
        let mojeOtocneBody = []; let mapMarkers = []; let mapVisuals = []; let flightPolyline = null; let vsetkyTrate = {};
        let map = null;

        function inicializujMapu() {
            if (map) return;
            map = L.map('map').setView([48.6, 19.5], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            nacitatVsetkyTrateZPamate();
            map.on('click', mapClickAction);
        }

        function mapClickAction(e) {
            const lat = e.latlng.lat; const lon = e.latlng.lng;
            const nazov = prompt("Názov bodu:", "Otočák " + (mojeOtocneBody.length + 1));
            if (nazov === null) return;
            const radius = parseInt(prompt("Polomer valca (m):", "100")) || 100;
            mojeOtocneBody.push({ nazov: nazov.toUpperCase(), lat: lat, lon: lon, typ: "cylinder", rozmer: radius });
            vykresliVsetko();
        }

        function vykresliVsetko() {
            mapMarkers.forEach(m => map.removeLayer(m)); mapVisuals.forEach(v => map.removeLayer(v));
            mapMarkers = []; mapVisuals = [];
            mojeOtocneBody.forEach((b, i) => {
                mapMarkers.push(L.marker([b.lat, b.lon]).addTo(map).bindPopup(b.nazov));
                mapVisuals.push(L.circle([b.lat, b.lon], { color: 'red', radius: b.rozmer }).addTo(map));
            });
            let html = '<ul>'; mojeOtocneBody.forEach((b, i) => { html += "<li>" + b.nazov + " <button class='btn-del-single' onclick='zmazatBod("+i+")'>X</button></li>"; });
            document.getElementById('zoznam-bodov').innerHTML = html + '</ul>';
        }

        window.zmazatBod = function(i) { mojeOtocneBody.splice(i, 1); vykresliVsetko(); }
        function ulozitTratDoPamate() { const meno = document.getElementById('task-name-input').value; vsetkyTrate[meno] = mojeOtocneBody; localStorage.setItem('mpg_trate', JSON.stringify(vsetkyTrate)); vykresliTrate(); }
        function nacitatVsetkyTrateZPamate() { const d = localStorage.getItem('mpg_trate'); if (d) { vsetkyTrate = JSON.parse(d); vykresliTrate(); } }
        function vykresliTrate() { const ul = document.getElementById('ulozene-trate-list'); ul.innerHTML = ""; Object.keys(vsetkyTrate).forEach(m => { const li = document.createElement('li'); li.className = 'track-item'; li.innerText = m; li.onclick = () => { mojeOtocneBody = vsetkyTrate[m]; vykresliVsetko(); }; ul.appendChild(li); }); }

        document.getElementById('igc-input').addEventListener('change', function(e) {
            const file = e.target.files[0]; const reader = new FileReader();
            reader.onload = function(evt) {
                const text = evt.target.result; let menoPilota = "Neznámy pilot";
                text.split('\n').forEach(r => {
                    if (r.startsWith('H') && r.toUpperCase().includes('PILOT')) {
                        let casti = r.split(':'); if (casti.length > 1) menoPilota = casti.slice(1).join(':').trim();
                    }
                });
                document.getElementById('vysledky-box').style.display = "block";
                document.getElementById('pilot-box').innerHTML = "👤 Pilot: " + menoPilota;
            }; reader.readAsText(file);
        });

        inicializujMapu();
    </script>
</body>
</html>

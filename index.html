<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MPG Multi-Task Organizer FINAL</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 10px; margin: 0; }
        .card { background: #2d2d2d; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2, h3 { margin-top: 0; margin-bottom: 8px; }
        .input-text { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 5px; border: 1px solid #444; background: #1e1e1e; color: white; margin-bottom: 10px; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .btn { flex: 1; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #fff; text-align: center; font-size: 14px; min-width: 120px; }
        .btn-save { background: #4caf50; } .btn-reset { background: #555; } .btn-qr { background: #673ab7; }
        .btn-print { background: #e91e63; } .btn-kml { background: #ff9800; } .btn-csv { background: #00bcd4; }
        .track-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; padding: 0; list-style: none; }
        .track-item { background: #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; border: 1px solid #555; }
        .track-item.active { background: #00bcd4; }
        .btn-del-single { background: #f44336; color: white; border: none; padding: 2px 6px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: 10px; }
        .popup-del-link { color: #f44336; font-weight: bold; cursor: pointer; display: block; margin-top: 5px; text-decoration: underline; }
        
        #map { width: 100%; height: 450px; border-radius: 8px; border: 2px solid #444; background: #e5e3df; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #555; padding: 6px; text-align: center; }
        th { background: #333; }
        .penale-input, .dekl-input { padding: 4px; background: #1e1e1e; color: white; border: 1px solid #666; text-align: center; border-radius: 3px; }
        .penale-input { width: 45px; } .dekl-input { width: 65px; }
        .kontrola-box { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: #333; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .kontrola-input { width: 60px; padding: 5px; border-radius: 4px; border: 1px solid #555; background: #222; color: white; text-align: center; font-weight: bold; font-size: 16px; }
        .point-breakdown { font-size: 11px; color: #aaa; display: block; margin-top: 2px; }
        #status-kreslenia { background: #ff9800; color: #000; padding: 8px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; display: none; text-align: center; }
        
        /* CSS PRE TLAČ MAPY BEZ BIELEHO ŠTVORCA */
        body.prep-print-map .card:not(#map-container) { display: none !important; }
        body.prep-print-map #status-kreslenia { display: none !important; }
        body.prep-print-map h3 { display: none !important; }
        body.prep-print-map #map-container { padding: 0; margin: 0; border: none; box-shadow: none; background: transparent; }
        body.prep-print-map #map { border: none !important; border-radius: 0 !important; }
        body.prep-print-map #cancel-print-btn { display: block !important; }

        /* CSS PRE TLAČ VÝSLEDKOV */
        body.prep-print-board .card:not(#leaderboard-box) { display: none !important; }
        body.prep-print-board #status-kreslenia { display: none !important; }
        body.prep-print-board #leaderboard-box { background: transparent; box-shadow: none; border: none; padding: 0; }
        body.prep-print-board #leaderboard-box h3 { color: black; font-size: 20px; }

        @media print {
            @page { size: landscape; margin: 0; }
            body { background: #fff; color: #000; padding: 0; margin: 0; -webkit-print-color-adjust: exact; }
            
            body.prep-print-map #cancel-print-btn { display: none !important; } /* Tlačidlo sa na papier nedostane */
            .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
            
            table { font-size: 12px; color: black; width: 100%; } 
            th, td { border: 1px solid #ccc; padding: 4px; }
            th { background: #eee !important; }
            .dekl-input, .penale-input { border: none; background: transparent; color: black; font-weight: bold; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🧭 MPG Multi-Task Organizer FINAL</h2>
        <input type="text" id="task-name-input" class="input-text" value="Task 1">
        <div class="btn-group">
            <button class="btn btn-save" onclick="ulozitTratDoPamate()">Uložiť trať 💾</button>
            <button class="btn btn-print" onclick="tlacitMapu()">Tlačiť mapu 🖼️</button>
            <button class="btn btn-kml" onclick="exportovatDoKML()">Stiahnuť KML 🛰️</button>
            <button class="btn btn-qr" onclick="zobrazitQR()">QR Kód 📱</button>
            <button class="btn btn-reset" onclick="vynulovatTrat()">Vyčistiť 🔄</button>
        </div>
        <div id="qrcode-container" style="display:none; text-align:center; padding:15px; background:white; border-radius:8px;"></div>
        <ul id="ulozene-trate-list" class="track-list"></ul>
    </div>

    <div id="status-kreslenia">✏️ REŽIM BRÁNY: Klikni na mape, kde má brána KONČIŤ!</div>
    
    <div class="card" id="zoznam-bodov-container">
        <h3>📍 Bodový zoznam:</h3>
        <div id="zoznam-bodov"><em style="color: #888;">Klikaj do mapy! ("Štart"/"Cieľ" = Brána)</em></div>
    </div>

    <div class="card" id="map-container">
        <h3>🗺️ Mapa:</h3>
        <button id="cancel-print-btn" onclick="obnovitPoTlaci()" style="display:none; width:100%; padding:15px; background:#f44336; color:white; font-weight:bold; border:none; border-radius:5px; margin-bottom:10px; font-size:16px; cursor:pointer;">❌ ZRUŠIŤ NÁHĽAD TLAČE A VRÁTIŤ SA SPÄŤ</button>
        <div id="map"></div>
    </div>

    <div class="card" id="upload-container">
        <h3>📥 Nahrávanie letov</h3>
        <div class="kontrola-box">
            <label>Počet pretekárov:</label>
            <input type="number" id="pocet-pretekarov" class="kontrola-input" value="0" min="0" onchange="vyhodnotStatus()">
            <span id="upload-status" style="font-weight: bold; font-size: 14px; color: #aaa;">Zatiaľ nenahraté žiadne lety</span>
        </div>
        <label for="igc-input" style="display:block; background:#e67e22; padding:12px; border-radius:5px; text-align:center; cursor:pointer; font-weight:bold; color:white;">📂 VYBRAŤ A NAHRAŤ IGC SÚBORY</label>
        <input type="file" id="igc-input" accept=".igc" multiple style="display:none;">
    </div>

    <div class="card" id="leaderboard-box" style="display:none; overflow-x: auto;">
        <h3>🏆 Výsledková listina</h3>
        <div class="btn-group" style="margin-bottom: 10px;">
            <button class="btn btn-csv" onclick="exportovatDoCSV()">Stiahnuť CSV (Excel) 📊</button>
            <button class="btn btn-print" onclick="tlacitVysledky()">Tlačiť výsledky 🖨️</button>
        </div>
        <div id="leaderboard-table-container"></div>
    </div>

        let vysledkyPiloti = []; let rezimKresleniaBrany = false; let docasnyNazovBrany = ""; let prvyBodBrany = null; let docasnyMarker = null; let map = null;

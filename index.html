<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MPG Multi-Task Organizer FINAL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 10px; margin: 0; }
        .card { background: #2d2d2d; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2, h3 { margin-top: 0; margin-bottom: 8px; }
        .input-text { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 5px; border: 1px solid #444; background: #1e1e1e; color: white; margin-bottom: 10px; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .btn { flex: 1; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; color: #fff; text-align: center; font-size: 14px; min-width: 120px; }
        .btn-save { background: #4caf50; } .btn-reset { background: #555; } .btn-qr { background: #673ab7; }
        .btn-print { background: #e91e63; } .btn-kml { background: #ff9800; } .btn-csv { background: #00bcd4; }
        
        .track-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; padding: 0; list-style: none; }
        .track-item { background: #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; border: 1px solid #555; }
        .track-item.active { background: #00bcd4; }
        .btn-del-single { background: #f44336; color: white; border: none; padding: 2px 6px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: 10px; }
        .popup-del-link { color: #f44336; font-weight: bold; cursor: pointer; display: block; margin-top: 5px; text-decoration: underline; }
        
        #map-wrapper { position: relative; width: 100%; height: 450px; background: #e5e3df; border-radius: 8px; overflow: hidden; border: 2px solid #444; }
        #map { width: 100%; height: 100%; background: #e5e3df; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #555; padding: 6px; text-align: center; }
        th { background: #333; }
        .penale-input, .dekl-input { padding: 4px; background: #1e1e1e; color: white; border: 1px solid #666; text-align: center; border-radius: 3px; }
        .penale-input { width: 45px; } .dekl-input { width: 65px; }
        .kontrola-box { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: #333; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .kontrola-input { width: 60px; padding: 5px; border-radius: 4px; border: 1px solid #555; background: #222; color: white; text-align: center; font-weight: bold; font-size: 16px; }
        .point-breakdown { font-size: 11px; color: #aaa; display: block; margin-top: 2px; }
        #status-kreslenia { background: #ff9800; color: #000; padding: 8px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; display: none; text-align: center; }

        /* ======================================================== */
        /* OVLÁDANIE NÁHĽADU PRED TLAČOU                            */
        /* ======================================================== */
        #print-preview-controls { display: none; }
        
        body.in-print-preview #print-preview-controls { 
            display: flex; gap: 10px; position: fixed; top: 0; left: 0; right: 0; 
            background: #222; padding: 15px; z-index: 100000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        #print-preview-controls button { flex: 1; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; color: white; }
        .btn-confirm { background: #4caf50; } .btn-cancel { background: #f44336; }

        body.in-print-preview .card, body.in-print-preview #status-kreslenia, body.in-print-preview h2, body.in-print-preview h3 { display: none !important; }
        
        body.in-print-preview #map-wrapper {
            position: fixed; top: 70px; left: 0; right: 0; bottom: 0; width: auto; height: auto;
            border: none; border-radius: 0; z-index: 99999; background: white;
        }

        /* ======================================================== */
        /* SAMOTNÁ TLAČ (Čo dostane tlačiareň)                      */
        /* ======================================================== */
        @media print {
            @page { size: landscape; margin: 0; }
            body { background: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; }
            
            /* TLAČ MAPY */
            body.tlac-mapy * { visibility: hidden; }
            body.tlac-mapy #print-preview-controls { display: none !important; }
            body.tlac-mapy #map-wrapper, body.tlac-mapy #map-wrapper * { visibility: visible; }
            
            body.tlac-mapy #map-wrapper {
                position: absolute !important; left: 0 !important; top: 0 !important;
                width: 100vw !important; height: 100vh !important;
            }
            body.tlac-mapy #map {
                width: 1750px !important; height: 1200px !important; /* Presne tento obrovský formát sa zosníma na A4 */
                transform: none !important; /* Vypne umelé zmenšenie pre mobil */
            }
            body.tlac-mapy .leaflet-control-zoom { display: none !important; }

            /* TLAČ VÝSLEDKOV */
            body.tlac-vysledkov .card:not(#leaderboard-box) { display: none !important; }
            body.tlac-vysledkov #status-kreslenia { display: none !important; }
            body.tlac-vysledkov #leaderboard-box { background: transparent; box-shadow: none; border: none; padding: 0; display: block !important; }
            body.tlac-vysledkov table { font-size: 12px; color: black; width: 100%; } 
            body.tlac-vysledkov th, body.tlac-vysledkov td { border: 1px solid #ccc; padding: 4px; }
            body.tlac-vysledkov th { background: #eee !important; }
            body.tlac-vysledkov .dekl-input, body.tlac-vysledkov .penale-input { border: none; background: transparent; color: black; font-weight: bold; }
        }
    </style>
</head>
<body>
    <div id="print-preview-controls">
        <button class="btn-cancel" onclick="zavriNahladTlace()">❌ NÁVRAT</button>
        <button class="btn-confirm" onclick="spustiFyzickuTlac()">🖨️ SPUSTIŤ TLAČ</button>
    </div>

    <div class="card">
        <h2>🧭 MPG Multi-Task Organizer FINAL</h2>
        <input type="text" id="task-name-input" class="input-text" value="Task 1">
        <div class="btn-group">
            <button class="btn btn-save" onclick="ulozitTratDoPamate()">Uložiť trať 💾</button>
            <button class="btn btn-print" onclick="otvorNahladTlace()">Tlačiť mapu (HD) 🖼️</button>
            <button class="btn btn-kml" onclick="exportovatDoKML()">Stiahnuť KML 🛰️</button>
            <button class="btn btn-qr" onclick="zobrazitQR()">QR Kód 📱</button>
            <button class="btn btn-reset" onclick="vynulovatTrat()">Vyčistiť 🔄</button>
        </div>
        <div id="qrcode-container" style="display:none; text-align:center; padding:15px; background:white; border-radius:8px;"></div>
        <ul id="ulozene-trate-list" class="track-list"></ul>
    </div>

    <div id="status-kreslenia">✏️ REŽIM BRÁNY: Klikni na mape, kde má brána KONČIŤ!</div>
    
    <div class="card" id="zoznam-bodov-container">
        <h3>📍 Bodový zoznam:</h3>
        <div id="zoznam-bodov"><em style="color: #888;">Klikaj do mapy! ("Štart"/"Cieľ" = Brána)</em></div>
    </div>

    <div class="card" id="map-wrapper">
        <div id="map"></div>
    </div>

    <div class="card" id="upload-container">
        <h3>📥 Nahrávanie letov</h3>
        <div class="kontrola-box">
            <label>Počet pretekárov:</label>
            <input type="number" id="pocet-pretekarov" class="kontrola-input" value="0" min="0" onchange="vyhodnotStatus()">
            <span id="upload-status" style="font-weight: bold; font-size: 14px; color: #aaa;">Zatiaľ nenahraté žiadne lety</span>
        </div>
        <label for="igc-input" style="display:block; background:#e67e22; padding:12px; border-radius:5px; text-align:center; cursor:pointer; font-weight:bold; color:white;">📂 VYBRAŤ A NAHRAŤ IGC SÚBORY</label>
        <input type="file" id="igc-input" accept=".igc" multiple style="display:none;">
    </div>

    <div class="card" id="leaderboard-box" style="display:none; overflow-x: auto;">
        <h3>🏆 Výsledková listina</h3>
        <div class="btn-group" style="margin-bottom: 10px;">
            <button class="btn btn-csv" onclick="exportovatDoCSV()">Stiahnuť CSV (Excel) 📊</button>
            <button class="btn btn-print" onclick="spustiTlacVysledkov()">Tlačiť výsledky 🖨️</button>
        </div>
        <div id="leaderboard-table-container"></div>
    </div>

    <script>
        let mojeOtocneBody = []; let mapMarkers = []; let mapVisuals = []; let flightPolylines = []; let vsetkyTrate = {};
        let vysledkyPiloti = []; let rezimKresleniaBrany = false; let docasnyNazovBrany = ""; let prvyBodBrany = null; let docasnyMarker = null; let map = null;
        
        const bodIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#e91e63; width:16px; height:16px; border-radius:50%; border:3px solid white; box-shadow: 0px 0px 5px rgba(0,0,0,0.8);'></div>",
            iconSize: [22, 22],
            iconAnchor: [11, 11]
        });

        // ===================================================================
        // FUNKCIE PRE BEZPEČNÚ HD TLAČ
        // ===================================================================
        window.otvorNahladTlace = function() {
            if (mojeOtocneBody.length === 0) return alert("Najprv pridaj body na mapu!");

            document.body.classList.add('in-print-preview');
            document.body.classList.add('tlac-mapy');
            
            let mapEl = document.getElementById('map');

            // 1. Nastavíme brutálne rozlíšenie mapy pre HD detaily (poľné cesty)
            mapEl.style.width = '1750px';
            mapEl.style.height = '1200px';

            // 2. Opticky zmenšíme mapu len pre oči používateľa na displeji, aby videl, čo ide tlačiť
            let screenW = window.innerWidth;
            let screenH = window.innerHeight - 80;
            let optickyScale = Math.min(screenW / 1750, screenH / 1200);
            
            mapEl.style.transformOrigin = 'top left';
            mapEl.style.transform = `scale(${optickyScale})`;

            // 3. Prikážeme mape prepočítať sa a zameriame sa na body
            map.invalidateSize();
            let bodyPreZoom = [];
            mojeOtocneBody.forEach(b => {
                if (b.typ === "gate") { bodyPreZoom.push([b.p1[0], b.p1[1]]); bodyPreZoom.push([b.p2[0], b.p2[1]]); }
                else { bodyPreZoom.push([b.lat, b.lon]); }
            });
            if (bodyPreZoom.length > 0) {
                map.fitBounds(L.latLngBounds(bodyPreZoom), { padding: [50, 50] });
            }
        }

        window.zavriNahladTlace = function() {
            document.body.classList.remove('in-print-preview');
            document.body.classList.remove('tlac-mapy');
            
            let mapEl = document.getElementById('map');
            mapEl.style.width = '100%';
            mapEl.style.height = '100%';
            mapEl.style.transform = 'none';
            
            setTimeout(() => {
                map.invalidateSize();
                let bodyPreZoom = [];
                mojeOtocneBody.forEach(b => {
                    if (b.typ === "gate") { bodyPreZoom.push([b.p1[0], b.p1[1]]); bodyPreZoom.push([b.p2[0], b.p2[1]]); }
                    else { bodyPreZoom.push([b.lat, b.lon]); }
                });
                if (bodyPreZoom.length > 0) map.fitBounds(L.latLngBounds(bodyPreZoom), { padding: [20, 20] });
            }, 200);
        }

        window.spustiFyzickuTlac = function() {
            // Používateľ vidí že mapa je natiahnutá, stlačíme tlač a systém ju dostane v 1750x1200
            window.print();
        }

        window.spustiTlacVysledkov = function() {
            document.body.classList.add('tlac-vysledkov');
            window.print();
            setTimeout(() => { document.body.classList.remove('tlac-vysledkov'); }, 1000);
        }

        // ===================================================================

        function inicializujMapu() {
            map = L.map('map').setView([48.6, 19.5], 8);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
                maxZoom: 19 
            }).addTo(map);
            
            // Pridaná mierka na mapu, bude sa tlačiť vždy
            L.control.scale({ imperial: false, position: 'bottomleft', maxWidth: 200 }).addTo(map);

            nacitatVsetkyTrateZPamate();
            map.on('click', mapClickAction);
            setTimeout(() => { if(map) map.invalidateSize(); }, 500);
            window.addEventListener('resize', () => { if(map && !document.body.classList.contains('in-print-preview')) map.invalidateSize(); });
        }
        
        function mapClickAction(e) {
            const lat = e.latlng.lat; const lon = e.latlng.lng;
            if (rezimKresleniaBrany) {
                if (docasnyMarker) map.removeLayer(docasnyMarker);
                document.getElementById('status-kreslenia').style.display = "none"; rezimKresleniaBrany = false;
                mojeOtocneBody.push({ nazov: docasnyNazovBrany, typ: "gate", lat: (prvyBodBrany.lat + lat) / 2, lon: (prvyBodBrany.lon + lon) / 2, p1: [prvyBodBrany.lat, prvyBodBrany.lon], p2: [lat, lon] });
                prekresliVsetkyBody(); return;
            }
            const cisloBodov = mojeOtocneBody.length + 1; let pNazov = cisloBodov === 1 ? "START" : "Otocak " + cisloBodov;
            const nazov = prompt("Názov bodu:", pNazov); if (!nazov) return; const nazovUpper = nazov.toUpperCase();
            if (nazovUpper === "START" || nazovUpper === "CIEL") {
                rezimKresleniaBrany = true; docasnyNazovBrany = nazovUpper; prvyBodBrany = { lat: lat, lon: lon };
                docasnyMarker = L.marker([lat, lon], {icon: bodIcon}).addTo(map);
                document.getElementById('status-kreslenia').style.display = "block";
            } else {
                const radius = parseInt(prompt("Polomer valca (m):", "100")) || 100;
                mojeOtocneBody.push({ nazov: nazovUpper, lat: lat, lon: lon, typ: "cylinder", rozmer: radius });
                prekresliVsetkyBody();
            }
        }

        function prekresliVsetkyBody() {
            mapMarkers.forEach(m => map.removeLayer(m)); mapVisuals.forEach(v => map.removeLayer(v));
            mapMarkers = []; mapVisuals = [];
            mojeOtocneBody.forEach((b, i) => {
                const marker = L.marker([b.lat, b.lon], {icon: bodIcon}).addTo(map).bindPopup(`<b>${b.nazov}</b><br><span class="popup-del-link" onclick="zmazatBod(${i})">🗑️ Zmazať</span>`);
                mapMarkers.push(marker);
                if (b.typ === "gate") { mapVisuals.push(L.polyline([b.p1, b.p2], { color: '#ff9800', weight: 6 }).addTo(map)); }
                else { mapVisuals.push(L.circle([b.lat, b.lon], { color: 'red', fillColor: '#f03', fillOpacity: 0.15, radius: b.rozmer }).addTo(map)); }
            });
            let html = '<ul>'; mojeOtocneBody.forEach((b, i) => { html += `<li><strong>${i+1}. ${b.nazov}</strong> <button class="btn-del-single" onclick="zmazatBod(${i})">X</button></li>`; });
            document.getElementById('zoznam-bodov').innerHTML = html + '</ul>';
            vykresliLeaderboard();
        }

        window.zmazatBod = function(i) { mojeOtocneBody.splice(i, 1); prekresliVsetkyBody(); }
        function ulozitTratDoPamate() { const meno = document.getElementById('task-name-input').value; if(!meno) return; vsetkyTrate[meno] = mojeOtocneBody; localStorage.setItem('mpg_trate_final', JSON.stringify(vsetkyTrate)); vykresliZoznamUlozenychTrati(); }
        function nacitatVsetkyTrateZPamate() { const d = localStorage.getItem('mpg_trate_final'); if (d) { vsetkyTrate = JSON.parse(d); vykresliZoznamUlozenychTrati(); } }
        function vykresliZoznamUlozenychTrati() { const ul = document.getElementById('ulozene-trate-list'); ul.innerHTML = ""; Object.keys(vsetkyTrate).forEach(m => { const li = document.createElement('li'); li.className = 'track-item'; li.innerText = m; li.onclick = () => { mojeOtocneBody = vsetkyTrate[m]; prekresliVsetkyBody(); }; ul.appendChild(li); }); }
        function vynulovatTrat() { mojeOtocneBody = []; prekresliVsetkyBody(); document.getElementById('qrcode-container').style.display="none"; }
        
        function zobrazitQR() { 
            const qrBox = document.getElementById('qrcode-container'); 
            qrBox.innerHTML = "<h4 style='color:black; margin-top:0;'>Naskenuj pre body</h4>"; 
            const minified = mojeOtocneBody.map(b => `${b.nazov}|${b.lat.toFixed(5)}|${b.lon.toFixed(5)}`).join(';'); 
            new QRCode(qrBox, { text: minified, width: 200, height: 200 }); 
            qrBox.style.display = "block"; 
        }

        function exportovatDoKML() {
            if (mojeOtocneBody.length === 0) return alert("Nemáš žiadne body na mape!");
            let kml = '<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';
            mojeOtocneBody.forEach(b => { kml += `<Placemark><name>${b.nazov}</name><Point><coordinates>${b.lon},${b.lat},0</coordinates></Point></Placemark>`; });
            kml += '</Document></kml>';
            const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "MPG_Task.kml"; a.click();
        }

        function parseCoord(str, isLon) { let d = parseFloat(str.substring(0, isLon ? 3 : 2)); let m = parseFloat(str.substring(isLon ? 3 : 2
